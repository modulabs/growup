version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      # Uncomment and adjust path to mount token.json
      # - ./token.json:/app/token.json
    environment:
      # Override DATABASE_URL to use 'db' service hostname
      - DATABASE_URL=postgresql+asyncpg://growup:growup_dev@db:5432/growup
      # Ensure config points to mounted token
      # - GOOGLE_CREDENTIALS_PATH=/app/token.json
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: growup
      POSTGRES_PASSWORD: growup_dev
      POSTGRES_DB: growup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
