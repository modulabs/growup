version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app/app
      # Mount token.json
      - ./token.json:/app/token.json
    environment:
      # Override DATABASE_URL to use 'db' service hostname
      - DATABASE_URL=postgresql+asyncpg://growup:growup_dev@db:5432/growup
      # Ensure config points to mounted token
      - GOOGLE_CREDENTIALS_PATH=/app/token.json
    ports:
      - "80:80"
    env_file:
      - ./backend/.env
    privileged: true
    security_opt:
      - apparmor:unconfined
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    privileged: true
    security_opt:
      - apparmor:unconfined
    environment:
      POSTGRES_USER: growup
      POSTGRES_PASSWORD: growup_dev
      POSTGRES_DB: growup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

volumes:
  postgres_data:
